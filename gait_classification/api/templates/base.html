<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gait Models{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-logo">Gait Auth</a>
            <div class="navbar-links">
                <a href="/enroll" class="navbar-link navbar-link--primary">Verify Identity</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}

    <style>
        .navbar {
            background-color: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-logo {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .navbar-logo:hover {
            opacity: 0.8;
        }

        .navbar-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .navbar-link {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .navbar-link:hover {
            background-color: #f3f4f6;
            color: var(--accent);
        }

        .navbar-link--primary {
            background-color: var(--accent);
            color: white;
            padding: 10px 24px;
        }

        .navbar-link--primary:hover {
            background-color: #0d5f57;
            color: white;
        }

        @media (max-width: 640px) {
            .navbar-container {
                padding: 0 16px;
            }

            .navbar-logo {
                font-size: 1rem;
            }

            .navbar-link {
                font-size: 0.9rem;
                padding: 6px 10px;
            }

            .navbar-link--primary {
                padding: 8px 16px;
            }
        }
    </style>
</body>
</html>
