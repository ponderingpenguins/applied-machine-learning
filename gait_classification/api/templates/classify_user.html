<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Classify user - ${selected_label}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --panel: #ffffff;
            --ink: #132033;
            --muted: #5e6b7e;
            --accent: #0f766e;
            --accent-soft: #d9f0ed;
            --border: #d7e0ea;
            --shadow: 0 18px 40px rgba(19, 32, 51, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #e8f4ff 0, transparent 35%),
                        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--ink);
        }
        .shell { max-width: 960px; margin: 0 auto; padding: 48px 24px 64px; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .panel__body { padding: 24px; }
        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 700;
        }
        h1 { margin: 10px 0 12px; font-size: clamp(2rem, 3vw, 3rem); line-height: 1.02; }
        .intro { margin: 0 0 20px; color: var(--muted); max-width: 64ch; }
        .summary {
            margin-bottom: 20px;
            padding: 16px;
            border-radius: 18px;
            background: var(--accent-soft);
            color: #0f3d3a;
        }
        .summary strong { display: block; margin-bottom: 6px; }
        .button-row { display: flex; flex-wrap: wrap; gap: 12px; }
        .button-row a {
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            background: var(--accent);
            color: white;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .button-row .secondary { background: #e7edf3; color: var(--ink); }
        .meta-links { display: grid; gap: 10px; margin-top: 18px; }
        .meta-links a { color: var(--accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <main class="shell">
        <section class="panel">
            <div class="panel__body">
                <div class="eyebrow">User classification</div>
                <h1>Classify a user with the ${selected_label} model.</h1>
                <p class="intro">Once trusted users have been added, this page is where user data can be compared against the enrolled set.</p>

                <div class="summary">
                    <strong>Selected model</strong>
                    <p>${selected_label}</p>
                </div>

                <div class="button-row">
                    <a href="/models/${selected_model_value}/encode">Add trusted user</a>
                    <a class="secondary" href="/models/${selected_model_value}">Back to model page</a>
                </div>

                <div class="meta-links">
                    <a href="/models/data">View model list as JSON</a>
                    <a href="/docs">Open API docs</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
